<!doctype html>
<html lang=en>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Alexander Krischer</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=JetBrains+Mono:wght@300;400&display=swap" rel=stylesheet>
<style>*,::after,::before{box-sizing:border-box;margin:0;padding:0}:root{--bg:#091724;--surface:#0d2035;--accent:#01C3CD;--accent-dim:#017f87;--text:#FBFFFF;--muted:#5a8fa0;--border:rgba(1,195,205,0.2);--border-soft:rgba(251,255,255,0.07)}body,html{height:100%;width:100%;overflow:hidden}body{background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;color:var(--text);position:relative}.sky{position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 15% 70%,rgba(1,50,70,.55) 0,transparent 60%),radial-gradient(ellipse 60% 40% at 85% 20%,rgba(1,40,60,.45) 0,transparent 55%),var(--bg);z-index:0}.glow-blob{position:fixed;width:540px;height:540px;border-radius:50%;background:radial-gradient(circle,rgba(1,195,205,.07) 0,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);z-index:0;animation:breathe 7s ease-in-out infinite}@keyframes breathe{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}}.grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(1,195,205,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(1,195,205,.05) 1px,transparent 1px);background-size:56px 56px;mask-image:radial-gradient(ellipse 65% 65% at 50% 50%,black 20%,transparent 80%)}.stars{position:fixed;inset:0;z-index:0}.star{position:absolute;width:1px;height:1px;background:#d6f9fb;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s)}@keyframes twinkle{0%,100%{opacity:var(--min-op, .05)}50%{opacity:var(--max-op, .5)}}.card{position:relative;z-index:10;width:min(460px,90vw);padding:52px 48px 48px;background:rgba(9,23,36,.82);border:1px solid var(--border);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 0 0 1px rgba(251,255,255,.03),0 40px 80px rgba(0,0,0,.6),0 0 60px rgba(1,195,205,.08),inset 0 1px 0 rgba(251,255,255,.05);animation:fadeUp 1s cubic-bezier(.16,1,.3,1) forwards;opacity:0}@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}.card::after,.card::before{content:'';position:absolute;width:14px;height:14px;border-color:var(--accent);border-style:solid}.card::before{top:-1px;left:-1px;border-width:2px 0 0 2px}.card::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0}.badge{display:inline-flex;align-items:center;gap:8px;background:rgba(1,195,205,.08);border:1px solid rgba(1,195,205,.25);border-radius:4px;padding:4px 10px;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:32px;opacity:0;animation:fadeIn .7s ease forwards .35s}.badge-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:pulse 2.5s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}.name{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(38px, 9vw, 52px);line-height:1;letter-spacing:-.01em;color:var(--text);margin-bottom:8px;opacity:0;animation:fadeIn .7s ease forwards .55s}.name span{color:var(--accent)}.title{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:40px;opacity:0;animation:fadeIn .7s ease forwards .7s}.divider{width:100%;height:1px;background:linear-gradient(90deg,var(--accent-dim),transparent 70%);margin-bottom:32px;opacity:0;transform-origin:left;animation:expandLine .8s cubic-bezier(.16,1,.3,1) forwards .9s}@keyframes expandLine{from{opacity:0;transform:scaleX(0)}to{opacity:1;transform:scaleX(1)}}.contact{display:flex;flex-direction:column;gap:12px;opacity:0;animation:fadeIn .7s ease forwards 1s}.contact-item{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--muted);text-decoration:none;transition:color .2s}.contact-item:hover{color:var(--text)}.contact-item:hover .icon-wrap{border-color:var(--accent);background:rgba(1,195,205,.1);box-shadow:0 0 10px rgba(1,195,205,.18)}.icon-wrap{width:34px;height:34px;border:1px solid var(--border-soft);border-radius:6px;background:rgba(251,255,255,.03);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}.icon-wrap svg{width:14px;height:14px;stroke:var(--accent);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.cloud-mark{position:absolute;top:-22px;right:40px;opacity:0;animation:fadeIn 1s ease forwards 1.3s}.cloud-mark svg{width:44px;height:44px;filter:drop-shadow(0 0 12px rgba(1,195,205,.6))}@keyframes fadeIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}.footer-label{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:rgba(1,195,205,.22);z-index:5;white-space:nowrap}</style>
</head>
<body>
<div class=sky></div>
<div class=glow-blob></div>
<div class=grid></div>
<div class=stars id=stars></div>
<article class=card>
<div class=cloud-mark>
<svg viewBox="0 0 44 44" fill=none xmlns=http://www.w3.org/2000/svg>
<path d="M32 27H13a9 9 0 1 1 1.8-17.82A10.5 10.5 0 1 1 32 20" stroke=#01C3CD stroke-width=1.4 stroke-linecap=round stroke-linejoin=round />
<rect x=16 y=30 width=12 height=3.2 rx=1.2 stroke=#01C3CD stroke-width=1.2 />
<rect x=16 y=35.5 width=12 height=3.2 rx=1.2 stroke=#01C3CD stroke-width=1.2 />
<circle cx=25.5 cy=31.6 r=0.9 fill=#01C3CD />
<circle cx=25.5 cy=37.1 r=0.9 fill=#01C3CD />
</svg>
</div>
<h1 class=name>Alexander<br><span>Krischer</span></h1>
<p class=title>Cloud Engineer</p>
<div class=divider></div>
<div class=contact>
<a class=contact-item href=mailto:alexander@krischer.dev>
<div class=icon-wrap>
<svg viewBox="0 0 24 24">
<rect x=2 y=4 width=20 height=16 rx=2 />
<path d="M2 7l10 7 10-7"/>
</svg>
</div>
alexander@krischer.dev
</a>
</div>
</article>
<script>const container=document.getElementById("stars");for(let n=0;n<100;n++){const n=document.createElement("div");n.className="star",n.style.cssText=`\n        top:${100*Math.random()}%;\n        left:${100*Math.random()}%;\n        --d:${2+4*Math.random()}s;\n        --delay:${5*-Math.random()}s;\n        --min-op:${.05+.08*Math.random()};\n        --max-op:${.3+.45*Math.random()};\n        width:${Math.random()>.8?2:1}px;\n        height:${Math.random()>.8?2:1}px;\n      `,container.appendChild(n)}</script>
</body>
</html>
